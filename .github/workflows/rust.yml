name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: nightly
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose

  cross-platform-check:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
    steps:
    - uses: actions/checkout@v4
    - uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: nightly
        targets: ${{ matrix.target }}
    - name: Check
      run: cargo check --target ${{ matrix.target }}

  release:
    name: Create Release
    needs: build
    # Only run this job if the event is a push/merge to master
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    
    # Explicitly grant the GITHUB_TOKEN permissions needed to create a release
    permissions:
      contents: write 

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set short SHA
      run: echo "GIT_SHA_SHORT=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev
      
    - name: Install system dependencies for x11
      run: sudo apt-get update && sudo apt-get install -y libx11-dev libx11-xcb-dev
      
    - name: Build Release Bundle
      run: ./scripts/master-release-installer.sh "${{ github.workspace }}/dist"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: release-${{ github.sha }}
        name: Release ${{ env.GIT_SHA_SHORT }}
        generate_release_notes: true
        # Upload the installer bundle from master-release-installer.sh (tarball + checksum)
        files: |
          dist/*.tar.gz
          dist/*.sha256
